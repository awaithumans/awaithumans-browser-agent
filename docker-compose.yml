# Runs the awaithumans server locally (API + dashboard at http://localhost:3001).
#
# The demo store is saucedemo.com — public, no Docker needed.
#
# Spin up:
#   docker compose up -d
# Tear down:
#   docker compose down -v

services:
  awaithumans:
    image: ghcr.io/awaithumans/awaithumans:latest
    container_name: awaithumans-demo
    ports:
      - "3001:3001"
    environment:
      AWAITHUMANS_DATABASE_URL: sqlite:////app/data/awaithumans.db
      AWAITHUMANS_API_KEY: dev-key-not-secret
      AWAITHUMANS_PAYLOAD_KEY: ${AWAITHUMANS_PAYLOAD_KEY:-please-set-a-random-32-char-string-here}
      # Channel credentials are picked up from your .env via env_file below.
    env_file:
      - .env
    volumes:
      - awaithumans-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  awaithumans-data:
